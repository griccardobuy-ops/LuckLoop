<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Luck Loop – Missioni quotidiane per aumentare le tue opportunità reali." />
  <title>Luck Loop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-900: #0D1117;
      --navy-800: #161B24;
      --navy-700: #1C2333;
      --navy-600: #253047;
      --gold:     #C9A84C;
      --gold-lt:  #DFC57A;
      --cream:    #E8DCC8;
      --cream-dim:#B8A98A;
      --teal:     #4ECDC4;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--navy-900); color: var(--cream); font-family: 'Inter', system-ui, sans-serif; min-height: 100dvh; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 99px; }

    .app { max-width: 520px; margin: 0 auto; padding: 0 16px 80px; position: relative; }
    .glow-top { position: fixed; top: -120px; right: -120px; width: 360px; height: 360px; background: radial-gradient(circle, rgba(201,168,76,.07) 0%, transparent 70%); pointer-events: none; }
    .glow-bottom { position: fixed; bottom: -120px; left: -120px; width: 360px; height: 360px; background: radial-gradient(circle, rgba(78,205,196,.07) 0%, transparent 70%); pointer-events: none; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 8px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.3); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--gold); }
    .logo-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cream); letter-spacing: .03em; }

    nav { display: flex; gap: 4px; }
    nav button { background: none; border: none; cursor: pointer; color: var(--cream-dim); font-size: 13px; font-family: inherit; padding: 6px 10px; border-radius: 8px; transition: background .15s, color .15s; }
    nav button:hover { color: var(--cream); background: rgba(255,255,255,.07); }
    nav button.active { background: rgba(255,255,255,.1); color: var(--cream); }

    .page-title { font-family: 'Playfair Display', serif; font-size: 28px; line-height: 1.2; }
    .page-date { font-size: 13px; color: var(--cream-dim); margin-bottom: 4px; }

    .card { border-radius: 16px; padding: 20px; margin-bottom: 14px; }
    .card-teal { background: var(--navy-700); border: 1px solid rgba(78,205,196,.25); box-shadow: 0 0 28px rgba(78,205,196,.05); }
    .card-gold { background: var(--navy-700); border: 1px solid rgba(201,168,76,.25); box-shadow: 0 0 28px rgba(201,168,76,.05); }
    .card-glass { background: var(--navy-700); border: 1px solid rgba(255,255,255,.08); }
    .card-dark { background: var(--navy-800); border-radius: 12px; padding: 16px; }

    .tag { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; }
    .tag-real { color: var(--teal); background: rgba(78,205,196,.1); border: 1px solid rgba(78,205,196,.2); }
    .tag-game { color: var(--gold); background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.2); }

    .btn { display: inline-flex; align-items: center; justify-content: center; font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 12px; border: none; padding: 12px 20px; font-size: 14px; transition: transform .12s, opacity .15s, background .15s; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--gold); color: var(--navy-900); }
    .btn-primary:hover { background: var(--gold-lt); }
    .btn-teal { background: rgba(78,205,196,.1); color: var(--teal); border: 1px solid rgba(78,205,196,.3); }
    .btn-teal:hover { background: rgba(78,205,196,.18); }
    .btn-ghost { background: transparent; color: var(--cream-dim); border: 1px solid rgba(255,255,255,.15); }
    .btn-ghost:hover { border-color: rgba(255,255,255,.35); color: var(--cream); }
    .btn-danger { background: transparent; color: rgba(239,68,68,.6); border: 1px solid rgba(239,68,68,.25); font-size: 13px; padding: 8px 14px; }
    .btn-danger:hover { border-color: rgba(239,68,68,.5); color: rgba(239,68,68,.9); }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .impact { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px; }
    .impact-basso { color: var(--cream-dim); background: rgba(184,169,138,.1); }
    .impact-medio { color: var(--gold); background: rgba(201,168,76,.1); }
    .impact-alto  { color: var(--teal);  background: rgba(78,205,196,.1); }

    .streak-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px; background: var(--navy-700); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; margin-bottom: 18px; }
    .streak-item { display: flex; align-items: center; gap: 8px; }
    .streak-num { font-family: 'Playfair Display', serif; font-size: 22px; line-height: 1; }
    .streak-label { font-size: 11px; color: var(--cream-dim); }
    .streak-divider { width: 1px; height: 32px; background: rgba(255,255,255,.08); }

    .energy-option { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,.1); background: var(--navy-700); cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; margin-bottom: 10px; }
    .energy-option:hover { border-color: rgba(255,255,255,.25); }
    .energy-option.selected { border-color: var(--gold); background: rgba(201,168,76,.08); }
    .energy-name { font-size: 15px; font-weight: 600; color: var(--cream); }
    .energy-desc { font-size: 12px; color: var(--cream-dim); }
    .energy-check { margin-left: auto; width: 20px; height: 20px; border-radius: 50%; background: var(--gold); display: none; align-items: center; justify-content: center; }
    .energy-option.selected .energy-check { display: flex; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 20px; margin: 10px 0 8px; line-height: 1.25; }
    .card-desc { font-size: 13px; color: var(--cream-dim); line-height: 1.6; margin-bottom: 14px; }
    .card-why { border-top: 1px solid rgba(255,255,255,.08); padding-top: 12px; margin-bottom: 16px; }
    .card-why p { font-size: 12px; color: var(--cream-dim); line-height: 1.6; }
    .card-why strong { color: var(--teal); }
    .disclaimer { font-size: 11px; color: rgba(201,168,76,.5); font-style: italic; margin-bottom: 12px; }

    .completed-state { display: flex; align-items: center; gap: 12px; background: rgba(78,205,196,.08); border: 1px solid rgba(78,205,196,.2); border-radius: 12px; padding: 12px; }
    .completed-check { width: 32px; height: 32px; border-radius: 50%; background: var(--teal); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .completed-text strong { font-size: 13px; color: var(--teal); }
    .completed-text span { font-size: 11px; color: var(--cream-dim); display: block; }
    .confirm-row { display: flex; gap: 8px; }
    .confirm-label { font-size: 12px; color: var(--cream-dim); text-align: center; margin-bottom: 8px; }

    .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .wheel-container { position: relative; width: 180px; height: 180px; }
    .wheel-pointer { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 16px solid var(--gold); z-index: 2; }
    #wheel-svg { width: 180px; height: 180px; transition: transform 3s cubic-bezier(.17,.67,.12,.99); }
    .wheel-result { text-align: center; }
    .wheel-result strong { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); display: block; }
    .wheel-result span { font-size: 12px; color: var(--cream-dim); }

    .ritual-center { text-align: center; }
    .lucky-num { font-family: 'Playfair Display', serif; font-size: 80px; color: var(--gold); display: block; cursor: pointer; line-height: 1; transition: transform .2s; }
    .lucky-num:hover { transform: scale(1.08); }
    .triple-nums { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; }
    .num-box { width: 60px; height: 60px; border-radius: 12px; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; border: 2px solid rgba(255,255,255,.15); color: var(--cream-dim); background: none; cursor: pointer; transition: all .2s; }
    .num-box.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.1); }
    .color-swatch { width: 88px; height: 88px; border-radius: 16px; border: 2px solid rgba(255,255,255,.1); cursor: pointer; display: block; margin: 0 auto 10px; transition: transform .2s; }
    .color-swatch:hover { transform: scale(1.06); }
    .parola-btn { font-family: 'Playfair Display', serif; font-size: 36px; background: none; border: none; cursor: pointer; color: var(--cream-dim); transition: color .2s; }
    .parola-btn:hover, .parola-btn.active { color: var(--gold); }
    .animale-btn { font-size: 56px; background: none; border: none; cursor: pointer; transition: transform .2s; display: block; margin: 0 auto 8px; }
    .animale-btn:hover { transform: scale(1.1); }
    .ritual-sub { font-size: 12px; color: var(--cream-dim); }
    .ritual-name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); display: block; }
    .ritual-hint { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 6px; display: block; }
    .sup-done { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(201,168,76,.6); margin-top: 4px; }
    .hidden { display: none; }

    .done-banner { text-align: center; padding: 24px 0 8px; }
    .done-emoji { font-size: 36px; margin-bottom: 8px; }
    .done-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 4px; }
    .done-sub { font-size: 13px; color: var(--cream-dim); }
    .streak-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.2); border-radius: 99px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--gold); margin-top: 12px; }

    .how-section { margin-bottom: 14px; }
    .how-list li { display: flex; gap: 8px; font-size: 13px; color: var(--cream-dim); margin-bottom: 6px; line-height: 1.5; list-style: none; }
    .how-list li::before { content: '→'; color: var(--teal); flex-shrink: 0; }
    .no-list li { display: flex; gap: 8px; font-size: 13px; color: var(--cream-dim); margin-bottom: 6px; list-style: none; }
    .no-list li::before { content: '✕'; color: #f87171; flex-shrink: 0; }

    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .stat-box { background: var(--navy-700); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 12px; text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 24px; }
    .stat-label { font-size: 11px; color: var(--cream-dim); }
    .badge-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 6px; }
    .badge-row.earned { background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.18); }
    .badge-row.locked { opacity: .38; }
    .badge-emoji { font-size: 22px; }
    .badge-name { font-size: 13px; font-weight: 600; color: var(--gold); }
    .badge-desc { font-size: 11px; color: var(--cream-dim); }
    .history-item { display: flex; align-items: center; gap: 10px; background: var(--navy-800); border-radius: 10px; padding: 10px; margin-bottom: 6px; }
    .history-icon { font-size: 18px; }
    .history-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-meta { font-size: 11px; color: var(--cream-dim); }
    .history-check { width: 20px; height: 20px; border-radius: 50%; background: rgba(78,205,196,.2); flex-shrink: 0; margin-left: auto; display: flex; align-items: center; justify-content: center; }

    .debug-toggle { background: none; border: none; color: rgba(255,255,255,.2); font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 24px; }
    .debug-toggle:hover { color: rgba(255,255,255,.4); }
    .debug-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    #badge-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy-700); border: 1px solid rgba(201,168,76,.35); border-radius: 18px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; min-width: 260px; z-index: 100; box-shadow: 0 16px 48px rgba(0,0,0,.5); transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s; opacity: 0; pointer-events: none; }
    #badge-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .toast-title { font-family: 'Playfair Display', serif; font-size: 18px; line-height: 1.1; }
    .toast-desc { font-size: 11px; color: var(--cream-dim); }

    .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--cream-dim); font-family: inherit; font-size: 13px; cursor: pointer; margin-bottom: 20px; padding: 0; transition: color .15s; }
    .back-btn:hover { color: var(--cream); }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--cream-dim); margin-bottom: 12px; }
    h2.section-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 16px; }
    h3.card-sub { font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 8px; }

    .page { animation: fadeUp .4s ease-out both; }
    .flip-in { animation: flipIn .5s ease-out both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes flipIn { from { opacity:0; transform:rotateY(-70deg); } to { opacity:1; transform:rotateY(0); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:.01ms!important; transition-duration:.01ms!important; } }
  </style>
</head>
<body>

<div class="glow-top"></div>
<div class="glow-bottom"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">∞</div>
      <span class="logo-name">Luck Loop</span>
    </div>
    <nav>
      <button id="nav-history" onclick="showPage('history')">Archivio</button>
      <button id="nav-how" onclick="showPage('how')">Come funziona</button>
    </nav>
  </header>
  <main id="main"></main>
</div>

<div id="badge-toast">
  <span id="toast-emoji" style="font-size:32px"></span>
  <div>
    <div class="toast-label">Nuovo badge!</div>
    <div class="toast-title" id="toast-title"></div>
    <div class="toast-desc" id="toast-desc"></div>
  </div>
</div>

<script>
/* ── DATI ── */
const MISSIONI_REALI = [
  { id:'r01', categoria:'sociale', energia:['bassa','media','alta'], titolo:"Scrivi a qualcuno che non senti da un po'", descrizione:"Manda un messaggio breve e sincero a una persona che stimi. Non chiedere nulla, solo un contatto genuino.", impatto:'medio', perche:"Le reti sociali dormienti sono una delle fonti più sottovalutate di opportunità inaspettate." },
  { id:'r02', categoria:'sociale', energia:['media','alta'], titolo:"Parla con uno sconosciuto", descrizione:"Fai una domanda o un complimento sincero a una persona che non conosci. Bar, negozio, coda: qualunque contesto.", impatto:'alto', perche:"Le connessioni deboli (weak ties) aprono porte che le amicizie strette raramente raggiungono." },
  { id:'r03', categoria:'sociale', energia:['bassa'], titolo:"Rispondi al messaggio rimasto in sospeso", descrizione:"C'è qualcuno che aspetta una tua risposta. Fallo ora, anche con due righe.", impatto:'basso', perche:"L'affidabilità nelle piccole cose costruisce reputazione nel tempo." },
  { id:'r04', categoria:'sociale', energia:['media','alta'], titolo:"Partecipa a un evento", descrizione:"Trova un evento, meetup o incontro nel tuo settore o area di interesse. Basta essere presenti.", impatto:'alto', perche:"La presenza fisica o attiva aumenta la probabilità di essere ricordati e coinvolti." },
  { id:'r05', categoria:'sociale', energia:['bassa','media'], titolo:"Fai una micro-presentazione", descrizione:"Pensa a due persone che potrebbero trarre vantaggio dal conoscersi. Presentale via messaggio.", impatto:'alto', perche:"Chi connette gli altri viene percepito come risorsa preziosa e ricordato con gratitudine." },
  { id:'r06', categoria:'esplorazione', energia:['bassa','media','alta'], titolo:"Cambia percorso", descrizione:"Oggi prendi una strada diversa dal solito. Anche solo 10 minuti a piedi in una direzione nuova.", impatto:'basso', perche:"Piccoli cambiamenti di routine espongono il cervello a stimoli nuovi e aumentano la prontezza cognitiva." },
  { id:'r07', categoria:'esplorazione', energia:['media','alta'], titolo:"Entra in un posto che non hai mai frequentato", descrizione:"Un bar, una libreria, un negozio, un parco. Entra senza obiettivo e osserva.", impatto:'medio', perche:"L'esposizione a nuovi ambienti allarga il campo delle possibilità percepite." },
  { id:'r08', categoria:'esplorazione', energia:['bassa'], titolo:"Leggi un articolo fuori dalla tua nicchia", descrizione:"Cerca un argomento completamente fuori dalla tua comfort zone. Dedica 10 minuti senza giudicare.", impatto:'basso', perche:"Le idee contaminate da settori diversi producono soluzioni creative uniche." },
  { id:'r09', categoria:'esplorazione', energia:['media','alta'], titolo:"Prova qualcosa che rimandi da mesi", descrizione:"Quella cosa nella lista 'prima o poi'. Fallo per 20 minuti, solo per capire come ci si sente.", impatto:'alto', perche:"L'action bias — agire nonostante l'incertezza — è correlato alle opportunità percepite come 'fortuna'." },
  { id:'r10', categoria:'esplorazione', energia:['alta'], titolo:"Fai una cosa che ti spaventa un po'", descrizione:"Non qualcosa di pericoloso: qualcosa che ti mette a disagio in modo sano. Una presentazione, una chiamata, un tentativo.", impatto:'alto', perche:"La zona di disagio evolutivo è dove avvengono la maggior parte delle trasformazioni significative." },
  { id:'r11', categoria:'abitudini', energia:['bassa','media','alta'], titolo:"Riordina un singolo spazio", descrizione:"Scrivania, borsa, inbox email, una cartella sul computer. Un posto solo. Ordinato e finito.", impatto:'basso', perche:"Gli ambienti ordinati riducono il carico cognitivo e migliorano la capacità decisionale." },
  { id:'r12', categoria:'abitudini', energia:['bassa','media'], titolo:"Cammina 20 minuti senza schermo", descrizione:"Solo tu e il mondo. Nessun podcast, nessun audio. Lascia che la mente vada dove vuole.", impatto:'medio', perche:"Il default mode network, attivo nel riposo, è associato alla creatività e alla risoluzione di problemi complessi." },
  { id:'r13', categoria:'abitudini', energia:['bassa'], titolo:"Chiudi un micro-task aperto", descrizione:"Quella piccola cosa che hai in testa da giorni. Meno di 10 minuti. Chiudila.", impatto:'basso', perche:"I task aperti consumano banda cognitiva inconsapevolmente. Chiuderli libera risorse mentali reali." },
  { id:'r14', categoria:'abitudini', energia:['media','alta'], titolo:"30 minuti su qualcosa che stai imparando", descrizione:"Una skill, una lingua, uno strumento. Anche solo 30 minuti di pratica deliberata contano.", impatto:'alto', perche:"Il compounding dell'apprendimento: piccole sessioni regolari producono risultati sproporzionati nel tempo." },
  { id:'r15', categoria:'abitudini', energia:['media'], titolo:"Scrivi 3 cose che vuoi che accadano", descrizione:"Non una lista dei desideri: scrivi come se fossero già in corso. Presente, concreto, specifico.", impatto:'medio', perche:"La scrittura di intenzioni attiva il filtro attentivo del cervello e aumenta il riconoscimento di opportunità." },
  { id:'r16', categoria:'abitudini', energia:['bassa','media'], titolo:"Fai una domanda a qualcuno più esperto", descrizione:"Una sola domanda, genuina e specifica su un problema reale. Non chiedere consigli generici.", impatto:'alto', perche:"Fare buone domande è una delle competenze più rare e valorizzate in qualsiasi contesto." },
];

const MISSIONI_SUP = [
  { id:'s01', titolo:"Il tuo numero del giorno",       descrizione:"Ogni giorno la matematica casuale produce un numero. Trattalo come un segno, un amuleto, o ignoralo.", azione:'numero' },
  { id:'s02', titolo:"Gira la ruota della fortuna",    descrizione:"Un antico rituale digitale. Gira, osserva dove si ferma. Il significato è quello che vuoi dargli.", azione:'ruota' },
  { id:'s03', titolo:"Scegli un colore portafortuna",  descrizione:"Indossa o cerca oggi questo colore. È un gioco di attenzione selettiva: lo vedrai ovunque.", azione:'colore' },
  { id:'s04', titolo:"La parola del giorno",           descrizione:"Una parola estratta casualmente. Usala come filtro mentale della giornata. Solo per gioco.", azione:'parola' },
  { id:'s05', titolo:"Il tuo animale guida del giorno",descrizione:"Dalla tradizione simbolica mondiale: un animale per ogni giorno. Nessun significato reale, solo narrativa.", azione:'animale' },
  { id:'s06', titolo:"I numeri del giorno",            descrizione:"Tre numeri estratti per te. Usali come preferisci, o non usarli per niente.", azione:'numeri_tripli' },
];

/* ── SEED ── */
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return Math.abs(h);}
function rng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}
function pesca(arr,data,sale=''){return arr[Math.floor(rng(hash(data+sale))() * arr.length)];}
function numFortuna(d){return Math.floor(rng(hash(d+'num'))() * 99)+1;}
function numTripli(d){const r=rng(hash(d+'tri'));const s=new Set();while(s.size<3)s.add(Math.floor(r()*90)+1);return[...s];}
function idxRuota(d){return Math.floor(rng(hash(d+'whl'))() * 8);}

/* ── STORAGE ── */
const K={G:'ll_g',H:'ll_h',S:'ll_s',B:'ll_b',T:'ll_t'};
const sg=(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
function oggi(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ieriDi(s){const d=new Date(s+'T12:00:00');d.setDate(d.getDate()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
const caricoStato=()=>sg(K.G);
const salvaStato=(v)=>ss(K.G,v);
const storia=()=>sg(K.H)||[];
const streak=()=>sg(K.S)||{corrente:0,record:0,ultimaData:null};
const totale=()=>parseInt(localStorage.getItem(K.T)||'0',10);
const badgeGuadagnati=()=>sg(K.B)||[];

function aggiungiStoria(e){const h=storia();h.unshift({...e,completatoIl:new Date().toISOString()});ss(K.H,h.slice(0,100));}
function aggiornaStreak(data){const s=streak();if(s.ultimaData===data)return s;s.corrente=s.ultimaData===ieriDi(data)?s.corrente+1:1;s.record=Math.max(s.record,s.corrente);s.ultimaData=data;ss(K.S,s);return s;}
function incTotale(){const n=totale()+1;localStorage.setItem(K.T,n);return n;}
function daBadge(id){const b=badgeGuadagnati();if(b.includes(id))return false;b.push(id);ss(K.B,b);return true;}
function resetTutto(){Object.values(K).forEach(k=>localStorage.removeItem(k));}

/* ── COSTRUZIONE GIORNATA ── */
function costruisciGiornata(data,energia){
  const pool=MISSIONI_REALI.filter(m=>m.energia.includes(energia));
  return{
    data,energia,
    missioneReale:pesca(pool.length?pool:MISSIONI_REALI,data,energia),
    missioneSup:pesca(MISSIONI_SUP,data,'sup'),
    rituale:{colore:pesca(COLORI,data,'col'),parola:pesca(PAROLE,data,'par'),animale:pesca(ANIMALI,data,'ani'),numero:numFortuna(data),numeriTripli:numTripli(data),idxRuota:idxRuota(data)},
    realeCompletata:false,supCompletata:false,
  };
}

/* ── STATO APP ── */
let app={pagina:'home',giornata:null,streak:streak(),badge:badgeGuadagnati(),totale:totale(),debugAperto:false,ruotaGirata:false,confermaReale:false};

function avvia(){
  const salvato=caricoStato();
  if(salvato&&salvato.data===oggi())app.giornata=salvato;
  render();
}

/* ── AZIONI ── */
window.showPage=(p)=>{app.pagina=p;app.confermaReale=false;render();};
window.scegliEnergia=(liv)=>{const g=costruisciGiornata(oggi(),liv);salvaStato(g);app.giornata=g;app.ruotaGirata=false;render();};
window.toggleConferma=()=>{app.confermaReale=!app.confermaReale;render();};
window.completaReale=()=>{
  if(!app.giornata||app.giornata.realeCompletata)return;
  app.giornata.realeCompletata=true;salvaStato(app.giornata);
  aggiungiStoria({data:oggi(),missioneId:app.giornata.missioneReale.id,titolo:app.giornata.missioneReale.titolo,categoria:app.giornata.missioneReale.categoria,energia:app.giornata.energia});
  app.streak=aggiornaStreak(oggi());app.totale=incTotale();
  controllaBadge();app.confermaReale=false;render();
};
window.completaSup=()=>{if(!app.giornata||app.giornata.supCompletata)return;app.giornata.supCompletata=true;salvaStato(app.giornata);render();};
window.toccaRituale=()=>{window.completaSup();render();};
window.giraRuota=()=>{
  if(app.ruotaGirata)return;
  const svg=document.getElementById('wheel-svg');if(!svg)return;
  const ang=5*360+(360-app.giornata.rituale.idxRuota*45-22.5);
  svg.style.transform=`rotate(${ang}deg)`;
  app.ruotaGirata=true;
  setTimeout(()=>{window.completaSup();document.getElementById('wheel-result')?.classList.remove('hidden');document.getElementById('wheel-btn')?.classList.add('hidden');},3100);
};
window.rigenera=()=>{if(!app.giornata)return;const g=costruisciGiornata(oggi(),app.giornata.energia);salvaStato(g);app.giornata=g;app.ruotaGirata=false;render();};
window.resetCompleto=()=>{if(!confirm('Vuoi davvero resettare tutti i dati?'))return;resetTutto();app={pagina:'home',giornata:null,streak:streak(),badge:badgeGuadagnati(),totale:0,debugAperto:false,ruotaGirata:false,confermaReale:false};render();};
window.toggleDebug=()=>{app.debugAperto=!app.debugAperto;render();};

let _energiaSelezionata=null;
window.cliccaEnergia=(id)=>{
  _energiaSelezionata=id;
  document.querySelectorAll('.energy-option').forEach(el=>el.classList.remove('selected'));
  document.getElementById('eo-'+id)?.classList.add('selected');
  document.getElementById('conferma-energia').disabled=false;
};
window.confermaEnergia=()=>{if(_energiaSelezionata)scegliEnergia(_energiaSelezionata);};

function controllaBadge(){
  const checks=[
    {id:'primo_passo',ok:app.totale>=1},{id:'tre_giorni',ok:app.streak.corrente>=3},
    {id:'sette_giorni',ok:app.streak.corrente>=7},{id:'venti_missioni',ok:app.totale>=20},{id:'cinquanta',ok:app.totale>=50},
  ];
  for(const c of checks){if(c.ok&&!app.badge.includes(c.id)){if(daBadge(c.id)){app.badge=badgeGuadagnati();mostraToast(BADGE.find(b=>b.id===c.id));break;}}}
}
function mostraToast(b){
  const t=document.getElementById('badge-toast');
  document.getElementById('toast-emoji').textContent=b.emoji;
  document.getElementById('toast-title').textContent=b.label;
  document.getElementById('toast-desc').textContent=b.desc;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);
}

/* ── RENDER ── */
function render(){
  document.getElementById('nav-history').classList.toggle('active',app.pagina==='history');

  const main=document.getElementById('main');
  if(app.pagina==='how'){main.innerHTML=renderCome();return;}
  if(app.pagina==='history'){main.innerHTML=renderStoria();return;}
  renderHome(main);
}

  const data=oggi();
  const dataLabel=new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});

    </div>`;
  }

  if(!app.giornata){
    html+=renderSelezioneEnergia();
  } else {
    html+=renderCardReale(app.giornata.missioneReale,app.giornata.realeCompletata);
    html+=renderCardSup(app.giornata.missioneSup,app.giornata.rituale,app.giornata.supCompletata);
    if(app.giornata.realeCompletata&&app.giornata.supCompletata){
      html+=`<div class="done-banner page"><div class="done-emoji">✨</div><div class="done-title">Giornata completata</div><div class="done-sub">Torna domani per una nuova missione</div>${app.streak.corrente>1?`<div class="streak-pill">🔥 ${app.streak.corrente} giorni di fila</div>`:''}</div>`;

      <button class="debug-toggle" onclick="toggleDebug()">··· opzioni sviluppatore</button>

    </div>`;
  }
  html+=`</div>`;
  main.innerHTML=html;
}

}

  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num" style="color:var(--gold)">${app.totale}</div><div class="stat-label">missioni</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--teal)">${app.streak.corrente}</div><div class="stat-label">streak</div></div>
    <div class="stat-box"><div class="stat-num">${app.streak.record}</div><div class="stat-label">record</div></div>
  </div>
  <div class="card card-glass" style="margin-bottom:14px">
    <div class="section-label">Badge</div>
    ${BADGE.map(b=>{const e=app.badge.includes(b.id);return`<div class="badge-row ${e?'earned':'locked'}"><span class="badge-emoji">${b.emoji}</span><div><div class="badge-name" style="${e?'':'color:var(--cream-dim)'}">${b.label}</div><div class="badge-desc">${b.desc}</div></div>${e?`<div style="margin-left:auto;color:var(--gold)">✓</div>`:''}</div>`;}).join('')}
  </div>
  <div class="card card-glass">
    <div class="section-label">Missioni completate</div>
    ${h.length===0?`<p style="font-size:13px;color:var(--cream-dim);text-align:center;padding:16px 0">Nessuna missione ancora.<br>Inizia oggi!</p>`:
    h.map(e=>`<div class="history-item"><span class="history-icon">${CAT_ICON[e.categoria]||'🎯'}</span><div style="flex:1;min-width:0"><div class="history-title">${e.titolo}</div><div class="history-meta">${new Date(e.completatoIl).toLocaleDateString('it-IT',{day:'numeric',month:'short'})} · ${EN_EMOJI[e.energia]||''} ${e.energia}</div></div><div class="history-check"><svg fill="none" viewBox="0 0 24 24" stroke="var(--teal)" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div></div>`).join('')}
  </div>
</div>`;}

avvia();
</script>
</body>
</html>
