<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Luck Loop – Missioni quotidiane per aumentare le tue opportunità reali." />
  <title>Luck Loop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & BASE ────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-900: #0D1117;
      --navy-800: #161B24;
      --navy-700: #1C2333;
      --navy-600: #253047;
      --gold:     #C9A84C;
      --gold-lt:  #DFC57A;
      --gold-dim: #8A6F2E;
      --cream:    #E8DCC8;
      --cream-dim:#B8A98A;
      --teal:     #4ECDC4;
      --teal-dim: #2A8F88;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy-900);
      color: var(--cream);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 99px; }

    /* ── LAYOUT ──────────────────────────────────── */
    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 16px 80px;
      position: relative;
    }

    .glow-top {
      position: fixed; top: -120px; right: -120px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(201,168,76,.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-bottom {
      position: fixed; bottom: -120px; left: -120px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(78,205,196,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── HEADER ──────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 8px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(201,168,76,.15);
      border: 1px solid rgba(201,168,76,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--gold);
    }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--cream);
      letter-spacing: .03em;
    }

    nav { display: flex; gap: 4px; }
    nav button {
      background: none; border: none; cursor: pointer;
      color: var(--cream-dim); font-size: 13px; font-family: inherit;
      padding: 6px 10px; border-radius: 8px;
      transition: background .15s, color .15s;
    }
    nav button:hover { color: var(--cream); background: rgba(255,255,255,.07); }
    nav button.active { background: rgba(255,255,255,.1); color: var(--cream); }

    /* ── TYPOGRAPHY ──────────────────────────────── */
    .display { font-family: 'Playfair Display', serif; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 28px; line-height: 1.2; }
    .page-date { font-size: 13px; color: var(--cream-dim); margin-bottom: 4px; }

    /* ── CARDS ───────────────────────────────────── */
    .card {
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .card-teal {
      background: var(--navy-700);
      border: 1px solid rgba(78,205,196,.25);
      box-shadow: 0 0 28px rgba(78,205,196,.05);
    }
    .card-gold {
      background: var(--navy-700);
      border: 1px solid rgba(201,168,76,.25);
      box-shadow: 0 0 28px rgba(201,168,76,.05);
    }
    .card-glass {
      background: var(--navy-700);
      border: 1px solid rgba(255,255,255,.08);
    }
    .card-dark {
      background: var(--navy-800);
      border-radius: 12px;
      padding: 16px;
    }

    /* ── TAGS ────────────────────────────────────── */
    .tag {
      display: inline-block;
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 99px;
    }
    .tag-real { color: var(--teal); background: rgba(78,205,196,.1); border: 1px solid rgba(78,205,196,.2); }
    .tag-game { color: var(--gold); background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.2); }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-weight: 600; cursor: pointer;
      border-radius: 12px; border: none;
      padding: 12px 20px; font-size: 14px;
      transition: transform .12s, opacity .15s, background .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--gold); color: var(--navy-900); }
    .btn-primary:hover { background: var(--gold-lt); }
    .btn-teal { background: rgba(78,205,196,.1); color: var(--teal); border: 1px solid rgba(78,205,196,.3); }
    .btn-teal:hover { background: rgba(78,205,196,.18); }
    .btn-ghost { background: transparent; color: var(--cream-dim); border: 1px solid rgba(255,255,255,.15); }
    .btn-ghost:hover { border-color: rgba(255,255,255,.35); color: var(--cream); }
    .btn-danger { background: transparent; color: rgba(239,68,68,.6); border: 1px solid rgba(239,68,68,.25); font-size: 13px; padding: 8px 14px; }
    .btn-danger:hover { border-color: rgba(239,68,68,.5); color: rgba(239,68,68,.9); }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── IMPACT BADGE ────────────────────────────── */
    .impact {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 8px;
    }
    .impact-basso { color: var(--cream-dim); background: rgba(184,169,138,.1); }
    .impact-medio { color: var(--gold); background: rgba(201,168,76,.1); }
    .impact-alto  { color: var(--teal);  background: rgba(78,205,196,.1); }

    /* ── STREAK BAR ──────────────────────────────── */
    .streak-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 12px 16px;
      background: var(--navy-700); border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; margin-bottom: 18px;
    }
    .streak-item { display: flex; align-items: center; gap: 8px; }
    .streak-num { font-family: 'Playfair Display', serif; font-size: 22px; line-height: 1; }
    .streak-label { font-size: 11px; color: var(--cream-dim); }
    .streak-divider { width: 1px; height: 32px; background: rgba(255,255,255,.08); }
    .badge-mini { font-size: 18px; }

    /* ── ENERGY SELECTOR ─────────────────────────── */
    .energy-option {
      display: flex; align-items: center; gap: 14px;
      width: 100%; text-align: left;
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: var(--navy-700); cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, background .15s;
      margin-bottom: 10px;
    }
    .energy-option:hover { border-color: rgba(255,255,255,.25); }
    .energy-option.selected { border-color: var(--gold); background: rgba(201,168,76,.08); }
    .energy-emoji { font-size: 22px; }
    .energy-name { font-size: 15px; font-weight: 600; color: var(--cream); }
    .energy-desc { font-size: 12px; color: var(--cream-dim); }
    .energy-check {
      margin-left: auto;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--gold); display: none;
      align-items: center; justify-content: center;
    }
    .energy-option.selected .energy-check { display: flex; }
    .energy-check svg { width: 11px; height: 11px; }

    /* ── MISSION CARD INTERNALS ──────────────────── */
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
    .card-icon { font-size: 20px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 20px; margin: 10px 0 8px; line-height: 1.25; }
    .card-desc { font-size: 13px; color: var(--cream-dim); line-height: 1.6; margin-bottom: 14px; }
    .card-why { border-top: 1px solid rgba(255,255,255,.08); padding-top: 12px; margin-bottom: 16px; }
    .card-why p { font-size: 12px; color: var(--cream-dim); line-height: 1.6; }
    .card-why strong { color: var(--teal); }
    .disclaimer { font-size: 11px; color: rgba(201,168,76,.5); font-style: italic; margin-bottom: 12px; }

    /* Completed state */
    .completed-state {
      display: flex; align-items: center; gap: 12px;
      background: rgba(78,205,196,.08);
      border: 1px solid rgba(78,205,196,.2);
      border-radius: 12px; padding: 12px;
    }
    .completed-check {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .completed-check svg { width: 16px; height: 16px; }
    .completed-text strong { font-size: 13px; color: var(--teal); }
    .completed-text span { font-size: 11px; color: var(--cream-dim); display: block; }

    .confirm-row { display: flex; gap: 8px; }
    .confirm-label { font-size: 12px; color: var(--cream-dim); text-align: center; margin-bottom: 8px; }

    /* ── SPIN WHEEL ──────────────────────────────── */
    .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .wheel-container { position: relative; width: 180px; height: 180px; }
    .wheel-pointer {
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 16px solid var(--gold);
      z-index: 2;
    }
    #wheel-svg { width: 180px; height: 180px; transition: transform 3s cubic-bezier(.17,.67,.12,.99); }
    .wheel-result { text-align: center; }
    .wheel-result strong { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); display: block; }
    .wheel-result span { font-size: 12px; color: var(--cream-dim); }

    /* Ritual elements */
    .ritual-center { text-align: center; }
    .lucky-num {
      font-family: 'Playfair Display', serif;
      font-size: 80px; color: var(--gold); display: block;
      cursor: pointer; line-height: 1;
      transition: transform .2s;
    }
    .lucky-num:hover { transform: scale(1.08); }
    .triple-nums { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; }
    .num-box {
      width: 60px; height: 60px; border-radius: 12px;
      font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
      border: 2px solid rgba(255,255,255,.15); color: var(--cream-dim);
      background: none; cursor: pointer; font-family: 'Playfair Display', serif;
      transition: all .2s;
    }
    .num-box.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.1); }
    .color-swatch {
      width: 88px; height: 88px; border-radius: 16px; border: 2px solid rgba(255,255,255,.1);
      cursor: pointer; display: block; margin: 0 auto 10px;
      transition: transform .2s;
    }
    .color-swatch:hover { transform: scale(1.06); }
    .parola-btn {
      font-family: 'Playfair Display', serif; font-size: 36px;
      background: none; border: none; cursor: pointer; color: var(--cream-dim);
      transition: color .2s;
    }
    .parola-btn:hover, .parola-btn.active { color: var(--gold); }
    .animale-btn {
      font-size: 56px; background: none; border: none; cursor: pointer;
      transition: transform .2s; display: block; margin: 0 auto 8px;
    }
    .animale-btn:hover { transform: scale(1.1); }
    .ritual-sub { font-size: 12px; color: var(--cream-dim); }
    .ritual-name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); display: block; }
    .ritual-hint { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 6px; display: block; }
    .sup-done { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(201,168,76,.6); margin-top: 4px; }

    /* ── COMPLETION BANNER ───────────────────────── */
    .done-banner {
      text-align: center; padding: 24px 0 8px;
    }
    .done-emoji { font-size: 36px; margin-bottom: 8px; }
    .done-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 4px; }
    .done-sub { font-size: 13px; color: var(--cream-dim); }
    .streak-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.2);
      border-radius: 99px; padding: 6px 16px;
      font-size: 13px; font-weight: 600; color: var(--gold);
      margin-top: 12px;
    }

    /* ── HOW IT WORKS ────────────────────────────── */
    .how-section { margin-bottom: 14px; }
    .how-list li { display: flex; gap: 8px; font-size: 13px; color: var(--cream-dim); margin-bottom: 6px; line-height: 1.5; }
    .how-list li::before { content: '→'; color: var(--teal); flex-shrink: 0; }
    .no-list li { display: flex; gap: 8px; font-size: 13px; color: var(--cream-dim); margin-bottom: 6px; }
    .no-list li::before { content: '✕'; color: #f87171; flex-shrink: 0; }

    /* ── HISTORY ─────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .stat-box { background: var(--navy-700); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 12px; text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 24px; }
    .stat-label { font-size: 11px; color: var(--cream-dim); }
    .badge-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 6px; }
    .badge-row.earned { background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.18); }
    .badge-row.locked { opacity: .38; }
    .badge-emoji { font-size: 22px; }
    .badge-name { font-size: 13px; font-weight: 600; color: var(--gold); }
    .badge-desc { font-size: 11px; color: var(--cream-dim); }
    .history-item { display: flex; align-items: center; gap: 10px; background: var(--navy-800); border-radius: 10px; padding: 10px; margin-bottom: 6px; }
    .history-icon { font-size: 18px; }
    .history-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-meta { font-size: 11px; color: var(--cream-dim); }
    .history-check { width: 20px; height: 20px; border-radius: 50%; background: rgba(78,205,196,.2); flex-shrink: 0; margin-left: auto; display: flex; align-items: center; justify-content: center; }
    .history-check svg { width: 11px; height: 11px; color: var(--teal); }

    /* ── DEBUG ───────────────────────────────────── */
    .debug-toggle { background: none; border: none; color: rgba(255,255,255,.2); font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 24px; }
    .debug-toggle:hover { color: rgba(255,255,255,.4); }
    .debug-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    /* ── BADGE TOAST ─────────────────────────────── */
    #badge-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--navy-700); border: 1px solid rgba(201,168,76,.35);
      border-radius: 18px; padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      min-width: 260px; z-index: 100;
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s;
      opacity: 0; pointer-events: none;
    }
    #badge-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .toast-title { font-family: 'Playfair Display', serif; font-size: 18px; line-height: 1.1; }
    .toast-desc { font-size: 11px; color: var(--cream-dim); }

    /* ── PAGE TRANSITIONS ────────────────────────── */
    .page { animation: fadeUp .4s ease-out both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .flip-in { animation: flipIn .5s ease-out both; }
    @keyframes flipIn { from { opacity:0; transform:rotateY(-70deg); } to { opacity:1; transform:rotateY(0); } }

    /* ── MISC ────────────────────────────────────── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; color: var(--cream-dim); font-family: inherit; font-size: 13px; cursor: pointer;
      margin-bottom: 20px; padding: 0;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--cream); }
    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 18px 0; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--cream-dim); margin-bottom: 12px; }
    h2.section-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 16px; }
    h3.card-sub { font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 8px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
    }
  </style>
</head>
<body>

<div class="glow-top"></div>
<div class="glow-bottom"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">∞</div>
      <span class="logo-name">Luck Loop</span>
    </div>
    <nav>
      <button id="nav-history" onclick="showPage('history')">Archivio</button>
      <button id="nav-how" onclick="showPage('how')">Come funziona</button>
    </nav>
  </header>

  <main id="main"></main>
</div>

<div id="badge-toast">
  <span id="toast-emoji" style="font-size:32px"></span>
  <div>
    <div class="toast-label">Nuovo badge!</div>
    <div class="toast-title" id="toast-title"></div>
    <div class="toast-desc" id="toast-desc"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const REAL_MISSIONS = [
  { id:'r01', category:'sociale', energy:['bassa','media','alta'], title:"Scrivi a qualcuno che non senti da un po'", description:"Manda un messaggio breve e sincero a una persona che stimi. Non chiedere nulla, solo un contatto genuino.", impact:'medio', impactNote:"Le reti sociali dormienti sono una delle fonti più sottovalutate di opportunità inaspettate." },
  { id:'r02', category:'sociale', energy:['media','alta'], title:"Parla con uno sconosciuto", description:"Fai una domanda o un complimento sincero a una persona che non conosci. Bar, negozio, coda: qualunque contesto.", impact:'alto', impactNote:"Le connessioni deboli (weak ties) aprono porte che le amicizie strette raramente raggiungono." },
  { id:'r03', category:'sociale', energy:['bassa'], title:"Rispondi al messaggio rimasto in sospeso", description:"C'è qualcuno che aspetta una tua risposta. Fallo ora, anche con due righe.", impact:'basso', impactNote:"L'affidabilità nelle piccole cose costruisce reputazione nel tempo." },
  { id:'r04', category:'sociale', energy:['media','alta'], title:"Partecipa a un evento", description:"Trova un evento, meetup o incontro nel tuo settore o area di interesse. Basta essere presenti.", impact:'alto', impactNote:"La presenza fisica o attiva aumenta la probabilità di essere ricordati e coinvolti." },
  { id:'r05', category:'sociale', energy:['bassa','media'], title:"Fai una micro-presentazione", description:"Pensa a due persone che potrebbero trarre vantaggio dal conoscersi. Presentale via messaggio.", impact:'alto', impactNote:"Chi connette gli altri viene percepito come risorsa preziosa e ricordato con gratitudine." },
  { id:'r06', category:'esplorazione', energy:['bassa','media','alta'], title:"Cambia percorso", description:"Oggi prendi una strada diversa dal solito. Anche solo 10 minuti a piedi in una direzione nuova.", impact:'basso', impactNote:"Piccoli cambiamenti di routine espongono il cervello a stimoli nuovi e aumentano la prontezza cognitiva." },
  { id:'r07', category:'esplorazione', energy:['media','alta'], title:"Entra in un posto che non hai mai frequentato", description:"Un bar, una libreria, un negozio, un parco. Entra senza obiettivo e osserva.", impact:'medio', impactNote:"L'esposizione a nuovi ambienti allarga il campo delle possibilità percepite." },
  { id:'r08', category:'esplorazione', energy:['bassa'], title:"Leggi un articolo fuori dalla tua nicchia", description:"Cerca un argomento completamente fuori dalla tua comfort zone. Dedica 10 minuti senza giudicare.", impact:'basso', impactNote:"Le idee contaminate da settori diversi producono soluzioni creative uniche." },
  { id:'r09', category:'esplorazione', energy:['media','alta'], title:"Prova qualcosa che rimandi da mesi", description:"Quella cosa nella lista 'prima o poi'. Fallo per 20 minuti, solo per capire come ci si sente.", impact:'alto', impactNote:"L'action bias – agire nonostante l'incertezza – è correlato alle opportunità percepite come 'fortuna'." },
  { id:'r10', category:'esplorazione', energy:['alta'], title:"Fai una cosa che ti spaventa un po'", description:"Non qualcosa di pericoloso: qualcosa che ti mette a disagio in modo sano. Una presentazione, una chiamata, un tentativo.", impact:'alto', impactNote:"La zona di disagio evolutivo è dove avvengono la maggior parte delle trasformazioni significative." },

/* ═══════════════════════════════════════════════════
   SEED / RANDOM
═══════════════════════════════════════════════════ */
function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = Math.imul(31, h) + str.charCodeAt(i) | 0; }
  return Math.abs(h);
}
function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}
function seededPick(arr, dateStr, salt='') {
  const rng = seededRng(hash(dateStr + salt));
  return arr[Math.floor(rng() * arr.length)];
}
function luckyNum(dateStr)    { return Math.floor(seededRng(hash(dateStr+'num'))() * 99) + 1; }
function tripleNums(dateStr)  { const rng = seededRng(hash(dateStr+'tri')); const s = new Set(); while(s.size<3) s.add(Math.floor(rng()*90)+1); return [...s]; }
function wheelIdx(dateStr)    { return Math.floor(seededRng(hash(dateStr+'whl'))() * 8); }

/* ═══════════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════════ */
const K = { DAY:'ll_day', HISTORY:'ll_hist', STREAK:'ll_streak', BADGES:'ll_badges', TOTAL:'ll_total' };
const get = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
const set = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function prevDay(s) { const d = new Date(s+'T12:00:00'); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function loadState()   { return get(K.DAY); }
function saveState(v)  { set(K.DAY, v); }
function getHistory()  { return get(K.HISTORY) || []; }
function getStreak()   { return get(K.STREAK) || {current:0, best:0, lastDate:null}; }
function getTotal()    { return parseInt(localStorage.getItem(K.TOTAL)||'0', 10); }
function getBadges()   { return get(K.BADGES) || []; }

function addHistory(entry) {
  const h = getHistory();
  h.unshift({...entry, completedAt: new Date().toISOString()});
  set(K.HISTORY, h.slice(0,100));
}
function updateStreak(dateStr) {
  const s = getStreak();
  if (s.lastDate === dateStr) return s;
  s.current = s.lastDate === prevDay(dateStr) ? s.current + 1 : 1;
  s.best = Math.max(s.best, s.current);
  s.lastDate = dateStr;
  set(K.STREAK, s);
  return s;
}
function incTotal() { const n = getTotal()+1; localStorage.setItem(K.TOTAL, n); return n; }
function awardBadge(id) { const b = getBadges(); if(b.includes(id)) return false; b.push(id); set(K.BADGES,b); return true; }

function resetAll() { Object.values(K).forEach(k => localStorage.removeItem(k)); }

/* ═══════════════════════════════════════════════════
   DAILY BUILD
═══════════════════════════════════════════════════ */
function buildDay(dateStr, energy) {
  const eligible = REAL_MISSIONS.filter(m => m.energy.includes(energy));
  const pool = eligible.length ? eligible : REAL_MISSIONS;
  return {
    date: dateStr, energy,
    realMission: seededPick(pool, dateStr, energy),
    supMission:  seededPick(SUP_MISSIONS, dateStr, 'sup'),
    ritual: {
      colore:  seededPick(COLORI, dateStr, 'col'),
      parola:  seededPick(PAROLE, dateStr, 'par'),
      animale: seededPick(ANIMALI, dateStr, 'ani'),
      luckyNumber: luckyNum(dateStr),
      tripleNumbers: tripleNums(dateStr),
      wheelIndex: wheelIdx(dateStr),
    },
    realCompleted: false,
    supCompleted:  false,
  };
}

   APP STATE
═══════════════════════════════════════════════════ */
let state = {
  page: 'home',
  daily: null,
  streak: getStreak(),
  badges: getBadges(),
  total: getTotal(),
  debugOpen: false,
  wheelSpun: false,
  confirmReal: false,
};

function init() {
  const saved = loadState();
  const td = today();
  if (saved && saved.date === td) {
    state.daily = saved;
  }
  render();
}

/* ═══════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════ */
window.showPage = (page) => {
  state.page = page;
  state.confirmReal = false;
  render();
};

window.selectEnergy = (level) => {
  const d = buildDay(today(), level);
  saveState(d);
  state.daily = d;
  state.wheelSpun = false;
  render();
};

window.toggleConfirmReal = () => {
  state.confirmReal = !state.confirmReal;
  render();
};

window.completeReal = () => {
  if (!state.daily || state.daily.realCompleted) return;
  state.daily.realCompleted = true;
  saveState(state.daily);
  addHistory({ date: today(), missionId: state.daily.realMission.id, missionTitle: state.daily.realMission.title, category: state.daily.realMission.category, energy: state.daily.energy });
  state.streak = updateStreak(today());
  state.total = incTotal();
  checkBadges();
  state.confirmReal = false;
  render();
};

window.completeSup = () => {
  if (!state.daily || state.daily.supCompleted) return;
  state.daily.supCompleted = true;
  saveState(state.daily);
  render();
};

window.spinWheel = () => {
  if (state.wheelSpun) return;
  const svg = document.getElementById('wheel-svg');
  if (!svg) return;
  const target = state.daily.ritual.wheelIndex;
  const sectorAngle = 360 / 8;
  const finalRot = 5 * 360 + (360 - target * sectorAngle - sectorAngle / 2);
  svg.style.transform = `rotate(${finalRot}deg)`;
  state.wheelSpun = true;
  setTimeout(() => {
    window.completeSup();
    document.getElementById('wheel-result')?.classList.remove('hidden');
    document.getElementById('wheel-btn')?.classList.add('hidden');
  }, 3100);
};

window.ritualTap = () => { window.completeSup(); render(); };

window.regenerate = () => {
  if (!state.daily) return;
  const d = buildDay(today(), state.daily.energy);
  d._forced = Date.now();
  saveState(d); state.daily = d; state.wheelSpun = false; render();
};

window.fullReset = () => {
  if (!confirm('Vuoi davvero resettare tutti i dati?')) return;
  resetAll();
  state = { page:'home', daily:null, streak:getStreak(), badges:getBadges(), total:0, debugOpen:false, wheelSpun:false, confirmReal:false };
  render();
};

window.toggleDebug = () => { state.debugOpen = !state.debugOpen; render(); };

function checkBadges() {
  const checks = [
    { id:'primo_passo', cond: state.total >= 1 },
    { id:'tre_giorni',  cond: state.streak.current >= 3 },
    { id:'sette_giorni',cond: state.streak.current >= 7 },
    { id:'venti_giorni',cond: state.total >= 20 },
    { id:'cinquanta',   cond: state.total >= 50 },
  ];
  for (const c of checks) {
    if (c.cond && !state.badges.includes(c.id)) {
      if (awardBadge(c.id)) {
        state.badges = getBadges();
        const badge = BADGES.find(b => b.id === c.id);
        showToast(badge);
        break;
      }
    }
  }
}

function showToast(badge) {
  const t = document.getElementById('badge-toast');
  document.getElementById('toast-emoji').textContent = badge.emoji;
  document.getElementById('toast-title').textContent = badge.label;
  document.getElementById('toast-desc').textContent = badge.desc;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

        </div>
        <div class="streak-divider"></div>
        <div class="streak-item">
          <span>🎯</span>
          <div>
            <div class="streak-num">${state.total}</div>
            <div class="streak-label">missioni totali</div>
          </div>
        </div>
        <div class="streak-divider"></div>
        <div style="display:flex;gap:4px;align-items:center">
          ${earnedBadges.length ? earnedBadges.map(b=>`<span class="badge-mini" title="${b.label}">${b.emoji}</span>`).join('') : `<span style="font-size:11px;color:var(--cream-dim)">nessun badge</span>`}
        </div>
      </div>
    `;
  }

  // Energy selector or mission cards
  if (!state.daily) {
    content += renderEnergySelector();
  } else {
    content += renderRealCard(state.daily.realMission, state.daily.realCompleted);
    content += renderSupCard(state.daily.supMission, state.daily.ritual, state.daily.supCompleted);

    if (state.daily.realCompleted && state.daily.supCompleted) {
      content += `
        <div class="done-banner page">
          <div class="done-emoji">✨</div>

          ${state.streak.current > 1 ? `<div class="streak-pill">🔥 ${state.streak.current} giorni di fila</div>` : ''}

        <button class="debug-toggle" onclick="toggleDebug()">··· opzioni sviluppatore</button>
        ${state.debugOpen ? `
          <div class="debug-row">
            <button class="btn btn-ghost" onclick="regenerate()" style="font-size:12px;padding:7px 12px">🔄 Rigenera giornata</button>
            <button class="btn btn-danger" onclick="fullReset()">🗑️ Reset completo</button>
          </div>

  }

  content += `</div>`;
  main.innerHTML = content;
}

    </div>

function renderRitual(action, ritual, done) {
  if (action === 'numero') {
    return `<div class="ritual-center">
      <span class="lucky-num" onclick="ritualTap()" style="${done?'color:var(--gold)':''}">${ritual.luckyNumber}</span>
      <span class="ritual-hint">${done?'':'Tocca il numero per riceverlo'}</span>
    </div>`;
  }
  if (action === 'numeri_tripli') {
    return `<div class="ritual-center">
      <div class="triple-nums">
        ${ritual.tripleNumbers.map(n=>`<button class="num-box ${done?'active':''}" onclick="ritualTap()">${n}</button>`).join('')}
      </div>
      <span class="ritual-sub">I tuoi tre numeri del giorno</span>
    </div>`;
  }
  if (action === 'ruota') {
    const spun = state.wheelSpun || done;
    return `<div class="wheel-wrap">
      <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <svg id="wheel-svg" viewBox="0 0 200 200" style="transition:transform 3s cubic-bezier(.17,.67,.12,.99)">
          ${SETTORI.map((s,i) => {
            const sa = i*45, ea = sa+45;
            const sr = (sa-90)*Math.PI/180, er = (ea-90)*Math.PI/180;
            const x1=100+95*Math.cos(sr), y1=100+95*Math.sin(sr);
            const x2=100+95*Math.cos(er), y2=100+95*Math.sin(er);
            const ma = (sa+ea)/2-90, mr=ma*Math.PI/180;
            const tx=100+65*Math.cos(mr), ty=100+65*Math.sin(mr);
            return `<g>
              <path d="M100 100 L${x1} ${y1} A95 95 0 0 1 ${x2} ${y2}Z" fill="${WHEEL_COLORS[i]}" stroke="#0D1117" stroke-width="1.5"/>
              <text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="7.5" font-weight="600" font-family="Inter,sans-serif" transform="rotate(${ma+90},${tx},${ty})">${s}</text>
            </g>`;
          }).join('')}
          <circle cx="100" cy="100" r="12" fill="#0D1117" stroke="#C9A84C" stroke-width="2"/>
        </svg>
      </div>
      <div id="wheel-result" class="${spun?'wheel-result':'wheel-result hidden'}">
        <strong>${SETTORI[ritual.wheelIndex]}</strong>
        <span>Il simbolo del tuo giorno</span>
      </div>
      <button id="wheel-btn" class="btn btn-primary" onclick="spinWheel()" style="${spun?'display:none':''}">Gira la ruota</button>
    </div>`;
  }
  if (action === 'colore') {
    const c = ritual.colore;
    return `<div class="ritual-center">
      <button class="color-swatch" style="background:${c.hex}" onclick="ritualTap()"></button>
      <span class="ritual-name">${c.nome}</span>
      <span class="ritual-sub">simbolo di ${c.simbolo}</span>
      ${done?'':'<span class="ritual-hint">Tocca il colore per riceverlo</span>'}
    </div>`;
  }
  if (action === 'parola') {
    return `<div class="ritual-center">
      <button class="parola-btn ${done?'active':''}" onclick="ritualTap()">${ritual.parola}</button>
      <span class="ritual-sub">La tua parola-filtro per oggi</span>
      ${done?'':'<span class="ritual-hint">Tocca per riceverla</span>'}
    </div>`;
  }
  if (action === 'animale') {
    const a = ritual.animale;
    return `<div class="ritual-center">
      <button class="animale-btn" onclick="ritualTap()">🐾</button>
      <span class="ritual-name">${a.nome}</span>
      <span class="ritual-sub">${a.simbolo}</span>
      ${done?'':'<span class="ritual-hint">Tocca per ricevere il tuo animale</span>'}
    </div>`;
  }
  return '';
}
